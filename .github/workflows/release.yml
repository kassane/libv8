name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build and release (e.g. v14.4.114.4)'
        required: true
        type: string

permissions:
  contents: write
  # Reusable build.yml declares `pull-requests: write` (for its
  # PR-comment-on-failure step). GitHub clamps a callee's permissions
  # to whatever the caller grants, so without this line release.yml's
  # `uses: ./.github/workflows/build.yml` is rejected at startup:
  #   "requesting 'pull-requests: write', but is only allowed
  #    'pull-requests: none'."
  # The PR-comment step inside build.yml is a no-op on tag events; the
  # grant just lets the reusable workflow start.
  pull-requests: write

jobs:
  build-default:
    uses: ./.github/workflows/build.yml
    with:
      profile: default
      upload_artifacts: true

  build-pointer-compression:
    uses: ./.github/workflows/build.yml
    with:
      profile: pointer-compression
      upload_artifacts: true

  release:
    needs: [build-default, build-pointer-compression]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten + checksum
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec cp -v {} release/ \;
          ls -la release/
          ( cd release && sha256sum *.tar.xz *.zip 2>/dev/null > SHA256SUMS || true )
          cat release/SHA256SUMS || true

      - name: Resolve release files
        id: files
        # Optional targets (windows-*, macos-*, linux-arm64) may fail per V8
        # 14.9 blockers documented in README — when they do, their archives
        # don't exist. Enumerate what's actually present rather than relying
        # on glob patterns, so softprops/action-gh-release doesn't trip its
        # "unmatched pattern" check on legitimately-absent optional outputs.
        # Hard-require the linux-x64 tar.xz (the only mandatory target).
        run: |
          shopt -s nullglob
          if ! compgen -G 'release/*linux-x64*.tar.xz' > /dev/null; then
            echo "::error::required linux-x64 archive missing from release/"
            ls -la release/
            exit 1
          fi
          {
            echo "list<<EOF"
            for f in release/*.tar.xz release/*.zip release/SHA256SUMS; do
              [[ -e "$f" ]] && echo "$f"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: ${{ steps.files.outputs.list }}
