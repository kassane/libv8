name: auto-tag

# Tags v$(cat VERSION) whenever VERSION lands on main. Pairs with
# version-check.yml's PR-based bump flow, but also covers manual edits.
# The tag push triggers release.yml.

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Tag v$(cat VERSION)
        run: |
          VERSION=$(head -n1 VERSION | tr -d '[:space:]')
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists, skipping"
            exit 0
          fi
          git config user.name  'libv8-bot'
          git config user.email 'libv8-bot@users.noreply.github.com'
          git tag -a "$TAG" -m "Auto-release for V8 $TAG"
          git push origin "$TAG"
