name: version-check

# Weekly upstream watcher. When V8 cuts a tag newer than ./VERSION,
# opens a `chore: bump V8 to <version>` PR with auto-merge enabled.
# CI on the PR runs the full build matrix; only a green PR merges,
# which is then picked up by auto-tag.yml to cut the release.

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Open a PR even if VERSION is already current'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      outdated: ${{ steps.check.outputs.outdated }}
      latest:   ${{ steps.check.outputs.latest }}
      current:  ${{ steps.check.outputs.current }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: ./scripts/check-version.sh

  open-pr:
    needs: check
    if: needs.check.outputs.outdated == 'true' || inputs.force == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          # PAT required if branch protection on main blocks the default
          # token from being a "trusted" PR author. Falls back to
          # GITHUB_TOKEN otherwise.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  'libv8-bot'
          git config user.email 'libv8-bot@users.noreply.github.com'

      - name: Push bump branch
        env:
          NEW: ${{ needs.check.outputs.latest }}
        run: |
          BRANCH="auto-bump/v${NEW}"
          # If the branch already exists upstream (previous run of this
          # workflow), reset to it; otherwise branch off main.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
          echo "$NEW" > VERSION
          if git diff --quiet; then
            echo "VERSION already $NEW on $BRANCH, nothing to commit"
          else
            git add VERSION
            git commit -m "chore: bump V8 to $NEW"
          fi
          git push -u origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open or update PR with auto-merge
        env:
          NEW: ${{ needs.check.outputs.latest }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # gh pr create exits non-zero if a PR for this head already
          # exists; tolerate that and fall through to enabling auto-merge.
          gh pr create \
            --title "chore: bump V8 to $NEW" \
            --body  "Automated weekly upstream bump. Auto-merge is enabled; this PR merges once required CI passes, after which auto-tag.yml cuts the v$NEW release." \
            --base  main \
            --head  "$BRANCH" \
            || echo "PR already exists for $BRANCH, continuing to enable auto-merge"
          gh pr merge "$BRANCH" --auto --squash --delete-branch
