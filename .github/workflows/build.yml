name: build

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'
      - 'args/**'
      - 'scripts/**'
      - '.gclient'
      - '.github/workflows/build.yml'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'VERSION'
      - 'args/**'
      - 'scripts/**'
      - '.gclient'
      - '.github/workflows/build.yml'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: false
        default: 'default'
        type: choice
        options: [default, pointer-compression, sandbox, i18n]
      runners:
        description: 'Which runner tiers to include'
        required: false
        default: 'all'
        type: choice
        options: [all, free-only]
  workflow_call:
    inputs:
      profile:
        description: 'Build profile'
        required: false
        default: 'default'
        type: string
      runners:
        description: 'Which runner tiers to include (all | free-only)'
        required: false
        default: 'all'
        type: string
      upload_artifacts:
        description: 'Whether to upload archives as workflow artifacts'
        required: false
        default: true
        type: boolean

concurrency:
  group: build-${{ github.ref }}-${{ inputs.profile || 'default' }}-${{ inputs.runners || 'all' }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed by the "Post failure log as PR comment" step on PR events.
  pull-requests: write

jobs:
  matrix:
    # GitHub Actions does not allow referencing matrix.* in job-level if:,
    # so we generate the matrix dynamically based on the `runners` input.
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - id: gen
        shell: bash
        env:
          RUNNERS: ${{ inputs.runners || 'all' }}
        run: |
          free='[
            {"target":"linux-x64","runner":"ubuntu-22.04","optional":false},
            {"target":"linux-arm64","runner":"ubuntu-22.04-arm","optional":true}
          ]'
          paid='[
            {"target":"macos-arm64","runner":"macos-latest","optional":true},
            {"target":"windows-x64","runner":"windows-latest","optional":true},
            {"target":"windows-arm64","runner":"windows-11-arm","optional":true}
          ]'
          if [[ "$RUNNERS" == "free-only" ]]; then
            include=$(jq -c <<<"$free")
          else
            include=$(jq -c --argjson a "$free" --argjson b "$paid" -n '$a + $b')
          fi
          echo "include=$include" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    name: ${{ matrix.target }} (${{ inputs.profile || 'default' }})
    runs-on: ${{ matrix.runner }}
    # macOS/Windows runners are billed; the matrix job marks them optional
    # so that a billing block or paid-runner outage does NOT fail the whole
    # workflow. Code regressions on Linux (free tier) still hard-fail PRs.
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    env:
      PROFILE: ${{ inputs.profile || 'default' }}
    steps:
      - uses: actions/checkout@v6

      - name: Read V8 version
        id: ver
        shell: bash
        run: echo "v8=$(head -n1 VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache pkg-config xz-utils lsb-release sudo curl \
            software-properties-common
          # On linux-arm64 we build with system gcc (see args/linux.arm64.gn
          # for why). gcc-12 from the ubuntu-22.04 base repos has incomplete
          # C++20 conformance for the patterns V8 14.9 emits (ambiguous
          # NewConsString partial-ordering, deleted-default-ctor from
          # unions with constexpr-but-non-trivial members, etc). gcc-14
          # resolves all of them; pull it from the toolchain-test PPA
          # which carries arm64 builds. libstdc++-14-dev is the matching
          # standard library (also brings the C++23 constexpr atomic
          # improvements clang/libc++ already had).
          #
          # V8's build invokes the compiler as `aarch64-linux-gnu-g++`
          # (the cross-compile-prefixed alias) even on native arm64,
          # so update-alternatives has to redirect THAT name — not just
          # `gcc`/`g++` — otherwise the build silently falls back to the
          # base image's gcc-11 and we see "unrecognized command-line
          # option -Wno-dangling-pointer" (a flag gcc-12+ introduced).
          if [[ "$(uname -m)" == "aarch64" ]]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              gcc-14 g++-14 libstdc++-14-dev binutils
            sudo update-alternatives \
              --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 \
              --slave   /usr/bin/g++ g++ /usr/bin/g++-14
            sudo update-alternatives \
              --install /usr/bin/aarch64-linux-gnu-gcc aarch64-linux-gnu-gcc \
                /usr/bin/gcc-14 60 \
              --slave   /usr/bin/aarch64-linux-gnu-g++ aarch64-linux-gnu-g++ \
                /usr/bin/g++-14
            # Verify the cross-prefix binary really resolves to gcc-14
            # (catches PPA install failures + missing alternatives).
            aarch64-linux-gnu-g++ --version
          fi
          # Make ccache the transparent default for any tool invocation,
          # the way kuoruan/libv8's Linux composite action does it.
          sudo update-ccache-symlinks
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"
          echo "CC_WRAPPER=ccache" >> "$GITHUB_ENV"

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: |
          brew install ccache xz
          echo "CC_WRAPPER=ccache" >> "$GITHUB_ENV"

      - name: Install Windows build deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Both just-js/v8 and kuoruan/libv8 build Windows without
          # ilammy/msvc-dev-cmd@v1 in the compile path; they rely on the
          # runner's default MSVC env. Match that.
          # depot_tools needs this on Windows to read the global gitconfig.
          git config --global depot-tools.allowGlobalGitConfig true
          "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -FilePath $env:GITHUB_ENV -Append

          # V8 14.9's build/vs_toolchain.py requires the "Debugging Tools for
          # Windows" SDK feature (run #22 PR comment: dbghelp.dll missing at
          # Windows Kits\10\Debuggers\x64\). windows-latest and
          # windows-11-arm both ship the SDK without that component.
          # Install via the official Windows 11 SDK 26100 setup with
          # /features OptionId.WindowsDesktopDebuggers.
          $ProgressPreference = 'SilentlyContinue'
          $sdk = "$env:RUNNER_TEMP\winsdksetup.exe"
          Invoke-WebRequest `
            -Uri 'https://go.microsoft.com/fwlink/?linkid=2286561' `
            -OutFile $sdk
          Start-Process -Wait -FilePath $sdk -ArgumentList @(
            '/features', 'OptionId.WindowsDesktopDebuggers',
            '/quiet', '/norestart'
          )

      - name: Cache compiler outputs
        uses: actions/cache@v5
        with:
          path: |
            .ccache
            .sccache
          key: cc-${{ matrix.target }}-${{ env.PROFILE }}-${{ steps.ver.outputs.v8 }}-${{ github.run_id }}
          restore-keys: |
            cc-${{ matrix.target }}-${{ env.PROFILE }}-${{ steps.ver.outputs.v8 }}-
            cc-${{ matrix.target }}-${{ env.PROFILE }}-
            cc-${{ matrix.target }}-

      - uses: ./.github/actions/setup-depot-tools

      - name: Fetch V8 source
        shell: bash
        run: ./scripts/fetch.sh

      - name: Install V8 system build deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # V8 ships a canonical apt installer at build/install-build-deps.sh
          # that pulls in libstdc++, glib, font/X11 stubs, etc. Without it
          # the default ubuntu-22.04 image is missing several headers GN/
          # ninja need. Pass --arm on aarch64 hosts so it skips i386 cross-
          # compile packages that don't exist on arm64.
          if [[ -x v8/build/install-build-deps.sh ]]; then
            EXTRA=""
            [[ "$(uname -m)" == "aarch64" ]] && EXTRA="--arm"
            sudo v8/build/install-build-deps.sh \
              --no-prompt --no-chromeos-fonts --no-nacl $EXTRA || true
          fi

      - name: Toolchain versions
        shell: bash
        run: |
          set +e
          echo "::group::tool versions"
          python3 --version
          (cd v8 && gn --version) || true
          (cd v8 && ninja --version) || true
          clang --version || true
          gcc --version || true
          cc --version || true
          uname -a
          echo "::endgroup::"

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          mkdir -p logs
          ./scripts/build.sh ${{ matrix.target }} ${{ env.PROFILE }} \
            2>&1 | tee logs/build-${{ matrix.target }}-${{ env.PROFILE }}.log

      - name: Dump build log inline on failure
        if: failure()
        shell: bash
        run: |
          LOG="logs/build-${{ matrix.target }}-${{ env.PROFILE }}.log"
          echo "::group::Last 200 lines of $LOG"
          [[ -f "$LOG" ]] && tail -n 200 "$LOG" \
            || echo "(no log file — failure was before Build step)"
          echo "::endgroup::"
          echo "::group::Effective args.gn"
          F="v8/out/${{ matrix.target }}.${{ env.PROFILE }}/args.gn"
          [[ -f "$F" ]] && cat "$F" || echo "(no args.gn)"
          echo "::endgroup::"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: buildlog-${{ matrix.target }}-${{ env.PROFILE }}
          path: |
            logs/
            v8/out/${{ matrix.target }}.${{ env.PROFILE }}/args.gn
            v8/out/${{ matrix.target }}.${{ env.PROFILE }}/args.resolved.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Surface build log to run summary on failure
        if: failure()
        shell: bash
        run: |
          LOG="logs/build-${{ matrix.target }}-${{ env.PROFILE }}.log"
          {
            echo "## Build failure: ${{ matrix.target }} (${{ env.PROFILE }})"
            echo ""
            if [[ -f "$LOG" ]]; then
              echo "### Last 200 lines of build log"
              echo '```'
              tail -n 200 "$LOG"
              echo '```'
            else
              echo "_(no $LOG produced — failed before Build step ran)_"
            fi
            echo ""
            if [[ -f "v8/out/${{ matrix.target }}.${{ env.PROFILE }}/args.gn" ]]; then
              echo "### Effective args.gn"
              echo '```'
              cat "v8/out/${{ matrix.target }}.${{ env.PROFILE }}/args.gn"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post failure log as PR comment
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ matrix.target }}
          PROFILE: ${{ env.PROFILE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        # Posts the build-log tail as a PR comment so it's readable from
        # the GitHub API without auth-gated artifact downloads. Best-effort
        # — never fail the job because the comment could not be posted.
        continue-on-error: true
        run: |
          LOG="logs/build-${TARGET}-${PROFILE}.log"
          [[ -f "$LOG" ]] || { echo "no log file"; exit 0; }
          BODY="$(mktemp)"
          {
            echo "### \`${TARGET}\` (${PROFILE}) failed — [run](${RUN_URL})"
            echo ""
            echo '<details><summary>Last 80 lines of build log</summary>'
            echo ""
            echo '```'
            tail -n 80 "$LOG"
            echo '```'
            echo '</details>'
          } > "$BODY"
          # gh ships preinstalled on every github-hosted runner.
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$BODY" || true

      - name: Package
        shell: bash
        run: ./scripts/package.sh ${{ matrix.target }} ${{ env.PROFILE }}

      - name: Upload artifact
        if: ${{ inputs.upload_artifacts != false }}
        uses: actions/upload-artifact@v7
        with:
          name: libv8-${{ steps.ver.outputs.v8 }}-${{ matrix.target }}-${{ env.PROFILE }}
          path: |
            dist/libv8-*-${{ matrix.target }}-${{ env.PROFILE }}.*
          if-no-files-found: error
          retention-days: 14
